# Optimizer / schedule / CFG / checkpointing (dev 04 §5–§6; 03 §8).
epochs: 7               # dev 04 Phase 2: 7–14 epochs
lr: 1.0e-4
weight_decay: 0.0
optimizer: adamw
warmup_steps: 500
min_lr_ratio: 0.0      # warmup->cosine decays to this fraction of base LR (dev 04 §5)
matmul_precision: high # TF32 on Ampere/Hopper float32 matmuls (dev 04 §11 recipe); "highest" = off
grad_clip: 1.0
cfg_drop_rate: 0.1     # zero-prompt dropout probability (dev 03 §8 / Q1.1: ~5–10%)
se3_augment: true      # toy path only: random-rotation aug on TARGET coords (dev 03 §7).
                       # data=cddb -> harness forces this OFF (the RFD3 pipeline augments natively).
masked_prompt_curriculum: false  # MVP skips it (dev 07 Q5.5)
tracker: null          # null | wandb | tensorboard  (dev 07 W5.4; install `[tracking]` if wandb)
wandb_entity: genomancer-consulting    # W&B account/team (Gregg-confirmed 2026-06-26)
wandb_project: structure-prompt-adapter
wandb_id: null         # set per run (e.g. spa-C-runA) to REATTACH the same W&B run after a Vertex restart
log_every_steps: 10    # train-metric logging cadence (console print + W&B)
ckpt_every_steps: 1000  # write rolling last.pt + a numbered snapshot every N optimizer steps
resume: auto            # auto = resume from ckpt_dir/last.pt if present (else fresh); false to ignore
val_every_steps: 1000   # periodic conditioned val-loss on the validate split (0=off; always off for toy)
val_batches: 8          # validate structures averaged per check (dev 04 §8 early-stop signal)
ckpt_dir: ${paths.ckpt_dir}
seed: 0
max_steps: 200         # OPTIMIZER-step budget (post grad-accum). Local sanity uses 200; the cloud
                       # runs override (~30k @ grad_accum=4 ≈ 10 h ≈ 120k forwards, dev 04 §11).
max_hours: null        # optional wall-clock early-stop; whichever of max_steps/max_hours hits first
n_cycle: 1             # RFD3 recycles per training forward
num_workers: 2         # data=cddb dataloader workers for live featurization (dev 09 §8: >=2 hides it
                       # behind the GPU step — live featurization, no second cache)
sampler: stratified    # stratified (length-balanced WeightedRandomSampler) | random (uniform shuffle); dev 04 §11
sampler_bins: 20       # equal-width length bins for the stratified sampler
sample_with_replacement: true   # true (default, original recipe): i.i.d. draws (a 30k sub-epoch covers ~28% of
                                #   the train set). false: WITHOUT-replacement pass — each structure ≤once/epoch,
                                #   MAX unique coverage per step; use when EXTENDING a sub-epoch onto unseen data (dev 28 §2)
capture_length: 24     # toy-overfit only: residue length for the synthetic-example capture run
synthetic_target_offset: 3.0  # toy-overfit only: artificial target = vanilla output + this·N(0,1) Å

# RFD3-native diffusion loss — values from the checkpoint's train_cfg (dev 06 step-6 mapping).
loss:
  sigma_data: 16
  weight: 4.0
  lddt_weight: 0.25
  alpha_ligand: 10.0
  unindexed_t_alpha: 0.75
