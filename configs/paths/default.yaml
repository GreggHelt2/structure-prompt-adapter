# Roots and absolute paths — kept in config/env, never in source (dev root CLAUDE.md portability rule).
# Override the project root via env: SPA_PROJECT_ROOT=/path python scripts/train.py
project_root: ${oc.env:SPA_PROJECT_ROOT,/home/user1/projects/spa}
models_root: ${paths.project_root}/models
data_root: ${paths.project_root}/training_data

# Frozen-host weights (dev root CLAUDE.md → Model Weights). RFD3 ckpt_path accepts an arbitrary path.
rfd3_ckpt: ${paths.models_root}/rfdiffusion3/rfd3_latest.ckpt
# ESM3 loads from the HF cache by name (esm3_sm_open_v1), not a path here. CLSS (variant A only)
# loads from HF too; leave clss_ckpt null unless overriding with a local file.
clss_ckpt: null

# Caches and outputs.
esm3_cache_dir: ${paths.data_root}/processed/esm3_cache
ckpt_dir: ${oc.env:SPA_CKPT_DIR,./checkpoints}
