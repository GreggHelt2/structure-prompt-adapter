# SPA Stage-1 design-generation knobs (dev 05_validation_pipeline.md "Stage 0 — Generate (RFD3 ± SPA)").
# All cost knobs (K, λ, length, sampler steps) are tuned at run time — nothing here is hardcoded in code.
ckpt: null                 # trained SPA adapter checkpoint (null -> untrained zero-init == identity/vanilla)
conditions: [baseline, spa]   # baseline (clear_prompt == vanilla RFD3) and/or spa (set_prompt + λ)
lambda_scale: 1.0          # SPA strength λ; float or list (swept for spa only; baseline is λ=0). 0 -> unconditional
num_designs: 8             # K designs per (condition, λ) — the RFD3 diffusion batch (one engine.run -> K backbones)
length: 100                # design length (residues) for unconditional generation
specification: null        # optional RFD3 DesignInputSpecification dict (augments/overrides `length`)
num_timesteps: null        # RFD3 sampler steps (null -> engine default 200; lower = faster/cheaper)
seed: 0                    # re-seeded before EVERY sampler run -> reproducible + paired noise across (condition, λ)
ladder: null               # checkpoint-step ADHERENCE LADDER (scripts/eval/ladder_sweep.py, dev 13): list of
                           #   snapshot paths to sweep (adherence vs training step). null -> not a ladder run.

# Prompt for condition=spa (the same structure-only ESM3 tap training used). Provide ONE:
prompt_pdb: null           # a structure file -> spa.prompt.esm3_prompt -> [N,1536] (ESM3 loaded once, then freed)
prompt_cache: null         # OR a precomputed [N,1536] .pt (cloud/ESM3 cache reuse; skips ESM3)
use_sequence: false        # structure-only prompt by default (dev 01 §3.5)
prompt_id: null            # output-name group id (null -> prompt file stem, else "design")

# Sub-region "scaffolding" eval (dev 17 §7 / 16 §9.5) — the multigranularity ("editing") probe.
# null -> off (byte-identical to today). When set, SPA conditions on a SUB-REGION S of the prompt
# only: generate.py masks the prompt to the kept rows (key_padding_mask True at rows ∉ S), and the
# flywheel scores sub-region motif-RMSD (design[S] / refold[S] vs prompt[S], self-aligned). Requires
# eval.length == N == the prompt-structure length so S indexes the design and prompt identically.
# MUTUALLY EXCLUSIVE with eval.motif (that path masks S; this one keeps S). N×1536 (variant C) only,
# per dev 17 §5 (pooled variants drop a per-residue mask). Usually driven by scripts/eval/run_scaffold_eval.py.
subregion: null            # e.g. {keep: [0,1,...,59]}  (0-based residue indices of S; attend to these rows only)

out_dir: ./outputs/eval/generate   # relative -> resolved against the original cwd under Hydra

# SPA Stage-2 inverse-folding knobs (dev 05_validation_pipeline.md "Stage 2 — Inverse fold (ProteinMPNN)").
# ProteinMPNN runs as a subprocess on its protein_mpnn_run.py (a script, not cleanly importable);
# PDB->FASTA handoff is file-based (dev 05 §4). Repo path is in configs/paths/default.yaml.
proteinmpnn:
  num_seqs: 8              # N sequences per backbone (best-of-8 self-consistency set; primary cost lever)
  sampling_temp: 0.1      # ProteinMPNN sampling temperature (0.1 default; higher -> more diverse seqs)
  seed: 0                 # ProteinMPNN RNG seed (reproducible sequence sampling)
  batch_size: 1           # must divide num_seqs (ProteinMPNN: NUM_BATCHES = num_seqs // batch_size)
  model_name: v_48_020    # bundled vanilla weights (dev 05 Stage 2 default; v_48_002/010/020/030)
  weights_dir: null       # null -> <paths.proteinmpnn_repo>/vanilla_model_weights (bundled default)
  ca_only: false          # full-atom backbone model (N,CA,C,O); true -> CA-only model
  conda_env: null         # null -> current interpreter (spa-dev, per Task 1.5); else `conda run -n <env>`
  designs: null           # explicit list of design PDBs; null -> design_dir / eval.out_dir glob *.pdb
  design_dir: null        # dir of Stage-1 design PDBs; null -> eval.out_dir (the Stage-1 output dir)
  out_dir: ./outputs/eval/seqs   # FASTAs land in <out_dir>/seqs/<design_stem>.fa (ProteinMPNN layout)

# SPA Stage-4 scoring knobs (dev 05_validation_pipeline.md §3 "Metrics" / 06_experiments.md §6).
# Designability = best-of-K Cα scRMSD vs OF3 refolds; adherence = TM-score (+ Cα prompt-RMSD) vs the
# prompt's source structure. All thresholds are knobs (dev root CLAUDE.md), never hardcoded in code.
score:
  scrmsd_cutoff: 2.0      # Å — best-of-K Cα scRMSD designability threshold (dev 05 §3 / 06 §6)
  plddt_cutoff: 80.0      # OF3 pLDDT designability gate (applied only when a pLDDT is supplied)
  tm_norm: prompt         # primary adherence TM normalization: prompt (fraction of prompt fold) | design | max
  diversity: true         # pairwise-TM diversity among the designable set (lower mean TM = more diverse)
  novelty: false          # novelty-vs-PDB (Foldseek) — stubbed; true raises NotImplemented until wired up

# SPA flywheel orchestration knobs (dev 05_validation_pipeline.md §1–§4 — wires Stages 1→4 end-to-end).
# Stage 3 (OpenFold3 refold) is pluggable + STUBBED: with refolder=null, designability is skipped and
# scoring is adherence-only. Reuses eval.conditions/lambda_scale/num_designs (Stage 1), proteinmpnn
# (Stage 2), and score (Stage 4) above — only the two flywheel-specific knobs live here.
flywheel:
  prompt_struct: null     # structure file to score prompt-adherence against; null -> eval.prompt_pdb
                          #   (eval.prompt_cache is an ESM3 tensor, not a structure, so it cannot serve here)
  refolder: null          # OF3 refolder (a Hydra _target_ spec satisfying score.Refolder); null -> skip
                          #   designability (adherence-only). OF3 is NOT implemented — this is the injection point.
