# B1-full eval manifest — the pinned cloud designability set (hard⊕soft, K=8/N=8, λ=1).
#
# = curated-15 (≤256 res; docs/plan/12 §3 / configs/eval/manifest_curated15.yaml) EXTENDED with a
# long-10 (256–384 res) drawn from the SAME pinned test split (v1_seed0_8-1-1_lenstrat, §12 50-pool
# rows #31–#50). The long-10 are H100-only (RFD3 gen + OF3 refold >256 need the H100; the calibration
# 2026-07-01 confirmed OF3 triton folds 384 res on the 80 GB H100). Purpose: firm the lean K=4
# designability (docs/results/02 §4) at K=8 AND extend it to the big folds the A5000 can't refold.
#
# Each entry yields BOTH a SPA soft-conditioning prompt (ESM3 [L,1536] .pt) AND a DSSP-carved self-motif
# (hard) spanning the full length (scripts/eval/carve_motif.py) — the hard⊕soft headline. pdb =
# <pdb_dir>/AF-<id>-F1-model_v4_esmfold_v1.pdb (local training_data; embeddings regenerated locally
# byte-identically, memory: esm3-weights-byte-identical-local-cloud). Prep: scripts/eval/prep_b1_full.py.

split_id: v1_seed0_8-1-1_lenstrat
pdb_pattern: "AF-{id}-F1-model_v4_esmfold_v1.pdb"
lambda_scale: 1
num_designs: 8
num_seqs: 8
spa_ckpt: spa-Nx1536-uncond/spa_C_final.pt   # Run A (N×1536, unconditional) — the emergent zero-shot headline ckpt

