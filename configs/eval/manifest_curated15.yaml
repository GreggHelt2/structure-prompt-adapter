# Curated-15 eval manifest — the pinned big-n eval set (dev 12 §3; pinned 2026-06-30).
#
# 15 held-out monomer fold prompts from the pinned test split (v1_seed0_8-1-1_lenstrat) — clean by
# construction (no leakage), ESM3 prompts already in esm3_cache.tar. Deliberately β-heavy vs the pool
# (6 β / 4 α-β / 3 α / 2 irregular) because β is RFD3's against-the-grain case + where variants may
# separate. The 3 anchors (#9, #10, #15) already characterized in docs/results/02 §2-§5 -> big-n EXTENDS
# known points. All ≤256 res (A5000-runnable as fallback; H100 for the matrix).
#
# Used by both big-n jobs: (Job B / breadth) each entry = the SPA soft-conditioning prompt, unconditional;
# (Job A / H5) each entry ALSO yields a carved self-motif (hard) — motif contigs TODO via DSSP carving
# (one helix/strand fragment per prompt; all-β -> strand-pair, all-α -> helix, α/β -> helix+strand).
# pdb = <pdb_dir>/AF-<id>-F1-model_v4_esmfold_v1.pdb ; prompt also available cached (esm3_cache.tar).

